<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Starosta — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
    }
    a { color: #A855F7; text-decoration: none; }

    /* Login */
    #login {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      padding: 24px;
    }
    #login h2 { font-size: 24px; font-weight: 700; }
    #login p { color: #71717a; font-size: 14px; }
    .login-box {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .login-box input {
      padding: 10px 16px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      width: 240px;
    }
    .login-box input:focus { border-color: #A855F7; }
    .login-error { color: #ef4444; font-size: 13px; display: none; }

    /* Admin panel */
    #admin { display: none; padding: 32px; max-width: 1200px; margin: 0 auto; }
    #admin.active { display: block; }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid #1a1a2e;
    }
    .admin-header h1 { font-size: 24px; font-weight: 700; }
    .admin-header span { color: #71717a; font-size: 13px; }

    h2.section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #A855F7;
    }

    /* Form */
    .form-card {
      background: #111;
      border: 1px solid #1a1a2e;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 40px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; color: #a1a1aa; font-weight: 500; }
    .form-group input, .form-group select {
      padding: 10px 14px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: #A855F7; }
    .form-group select { cursor: pointer; }
    .form-group select option { background: #18181b; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      background: #A855F7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 20px;
    }
    .btn:hover { background: #9333ea; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm {
      padding: 6px 14px;
      font-size: 12px;
      margin-top: 0;
      border-radius: 8px;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #27272a;
    }
    .btn-outline:hover { background: #18181b; }

    .generated-url {
      display: none;
      margin-top: 16px;
      padding: 16px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 10px;
    }
    .generated-url.active { display: flex; align-items: center; gap: 12px; }
    .generated-url code {
      flex: 1;
      font-size: 13px;
      color: #A855F7;
      word-break: break-all;
    }
    .copy-feedback {
      font-size: 12px;
      color: #22c55e;
      display: none;
      margin-top: 8px;
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid #1a1a2e;
      border-radius: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 12px 16px;
      background: #111;
      color: #71717a;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #1a1a2e;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a2e;
      color: #d4d4d8;
    }
    tr:hover td { background: rgba(168,85,247,0.04); }
    tr:last-child td { border-bottom: none; }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #27272a;
      border-radius: 999px;
      transition: background 0.2s;
    }
    .toggle .slider::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #A855F7; }
    .toggle input:checked + .slider::after { transform: translateX(18px); }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: #52525b;
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login">
    <h2>🔐 Admin přístup</h2>
    <p>Zadejte heslo pro přístup do administrace.</p>
    <div class="login-box">
      <input type="password" id="passwordInput" placeholder="Heslo..." autofocus>
      <button class="btn" onclick="tryLogin()">Přihlásit</button>
    </div>
    <p class="login-error" id="loginError">Nesprávné heslo.</p>
  </div>

  <!-- Admin -->
  <div id="admin">
    <div class="admin-header">
      <h1>AI Starosta — Admin</h1>
      <span>Demo token management</span>
    </div>

    <!-- Generate -->
    <h2 class="section-title">Vygenerovat nový token</h2>
    <div class="form-card">
      <div class="form-grid">
        <div class="form-group">
          <label>Jméno starosty</label>
          <input type="text" id="fName" placeholder="Martin Žabčík">
        </div>
        <div class="form-group">
          <label>Obec</label>
          <input type="text" id="fObec" placeholder="Ratiboř">
        </div>
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="fEmail" placeholder="starosta@obec.cz">
        </div>
        <div class="form-group">
          <label>Platnost</label>
          <select id="fExpiry">
            <option value="48">48 hodin</option>
            <option value="72">72 hodin</option>
            <option value="168">7 dní</option>
          </select>
        </div>
      </div>
      <button class="btn" id="generateBtn" onclick="generateToken()">Vygenerovat link</button>
      <div class="generated-url" id="generatedUrl">
        <code id="generatedCode"></code>
        <button class="btn btn-sm btn-outline" onclick="copyUrl()">📋 Kopírovat</button>
      </div>
      <p class="copy-feedback" id="copyFeedback">✓ Zkopírováno</p>
    </div>

    <!-- Table -->
    <h2 class="section-title">Přehled tokenů</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Starosta</th>
            <th>Obec</th>
            <th>Email</th>
            <th>Vytvořeno</th>
            <th>Vyprší</th>
            <th>Otevřeno</th>
            <th>První otevření</th>
            <th>Aktivní</th>
          </tr>
        </thead>
        <tbody id="tokenTableBody">
          <tr><td colspan="8" class="empty-state">Načítání...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://bnbzibkxcjuatwkdnrbs.supabase.co";
    const SERVICE_ROLE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuYnppYmt4Y2p1YXR3a2RucmJzIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjkwMTUxOSwiZXhwIjoyMDg4NDc3NTE5fQ.TBEeqTyQrsEUpriiVp3hU6yHaIBuNTf0wVSdHMzBaRo";
    const ADMIN_PASSWORD = "aistarosta2026";

    function headers() {
      return {
        "apikey": SERVICE_ROLE_KEY,
        "Authorization": `Bearer ${SERVICE_ROLE_KEY}`,
        "Content-Type": "application/json"
      };
    }

    function formatDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleDateString("cs-CZ", { day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    // Login
    document.getElementById('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') tryLogin();
    });

    function tryLogin() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === ADMIN_PASSWORD) {
        document.getElementById('login').style.display = 'none';
        document.getElementById('admin').classList.add('active');
        loadTokens();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    // UUID v4
    function uuid() {
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }

    // Generate token
    async function generateToken() {
      const name = document.getElementById('fName').value.trim();
      const obec = document.getElementById('fObec').value.trim();
      const email = document.getElementById('fEmail').value.trim();
      const hours = parseInt(document.getElementById('fExpiry').value);

      if (!name || !obec || !email) { alert('Vyplňte všechna pole.'); return; }

      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      btn.textContent = 'Generuji...';

      const token = uuid();
      const expires = new Date(Date.now() + hours * 3600 * 1000).toISOString();

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/demo_tokens`, {
          method: "POST",
          headers: { ...headers(), "Prefer": "return=representation" },
          body: JSON.stringify({
            token,
            starosta_jmeno: name,
            obec,
            email,
            expires_at: expires,
            opened_count: 0,
            active: true
          })
        });

        if (!res.ok) throw new Error(await res.text());

        const url = `https://ai-starosta.vercel.app/demo.html?token=${token}`;
        document.getElementById('generatedCode').textContent = url;
        document.getElementById('generatedUrl').classList.add('active');

        // Reset form
        document.getElementById('fName').value = '';
        document.getElementById('fObec').value = '';
        document.getElementById('fEmail').value = '';

        loadTokens();
      } catch (e) {
        console.error(e);
        alert('Chyba při generování tokenu.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Vygenerovat link';
      }
    }

    function copyUrl() {
      const code = document.getElementById('generatedCode').textContent;
      navigator.clipboard.writeText(code);
      const fb = document.getElementById('copyFeedback');
      fb.style.display = 'block';
      setTimeout(() => fb.style.display = 'none', 2000);
    }

    // Load tokens
    async function loadTokens() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/demo_tokens?select=*&order=created_at.desc`, {
          headers: headers()
        });
        const data = await res.json();
        renderTable(data);
      } catch (e) {
        console.error(e);
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('tokenTableBody');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Žádné tokeny.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(r => `
        <tr>
          <td>${esc(r.starosta_jmeno)}</td>
          <td>${esc(r.obec)}</td>
          <td>${esc(r.email)}</td>
          <td>${formatDate(r.created_at)}</td>
          <td>${formatDate(r.expires_at)}</td>
          <td>${r.opened_count || 0}</td>
          <td>${r.opened_at ? formatDate(r.opened_at) : '—'}</td>
          <td>
            <label class="toggle">
              <input type="checkbox" ${r.active ? 'checked' : ''} onchange="toggleActive('${r.token}', this.checked)">
              <span class="slider"></span>
            </label>
          </td>
        </tr>
      `).join('');
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // Toggle active
    async function toggleActive(token, active) {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/demo_tokens?token=eq.${token}`, {
          method: "PATCH",
          headers: { ...headers(), "Prefer": "return=minimal" },
          body: JSON.stringify({ active })
        });
      } catch (e) {
        console.error(e);
        loadTokens();
      }
    }
  </script>
</body>
</html>
